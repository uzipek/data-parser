name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Print a message
        run: echo "Building and testing data-parser..."
      - name: Build the project
        run: |
          mkdir -p build
          cd build
          cmake ..
          make